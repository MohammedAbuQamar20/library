   </header>
    <div class="container">
      <h2>Create new account</h2>
      <form action="" method="POST">
        <label for="nameId">Name</label>
        <input type="text" id="nameId" name="name" placeholder="Name" required>
        <label for="emailId">Email</label>
        <input type="text" id="emailId" name="email" placeholder="Email" required>
        <label for="urlId">Url</label>
        <input type="text" id="urlId" name="url" placeholder="URL" required>
        <label for="ageId">Age</label>
        <input type="text" id="ageId" name="age" placeholder="Age" required>
        <label for="phoneId">Phone</label>
        <input type="text" id="phoneId" name="phone" placeholder="Phone Number" required>
        <label for="countryId">Country</label>
        <input type="text" id="countryId" name="country" placeholder="Country" required>
        <label for="passwordId">Password</label>
        <input type="password" id="passwordId" name="password" placeholder="Password" required>
        <label for="confirm_passwordId">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
        <input type="submit" value="Register">
      </form>
